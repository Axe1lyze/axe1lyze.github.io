<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Apps</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            padding-top: 130px; 
            margin: 0;
        }
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #1e1e1e;
            color: #e0e0e0;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .fixed-header h1 {
            margin: 0 0 10px 0;
            color: #fff;
        }
        .table-dark {
            background-color: #1e1e1e;
        }
        a {
            color: #90caf9;
        }
        .main-content-container {
            width: 100%;
            padding: 0 15px;
        }
        /* Modalのダークモード調整 */
        .modal-content {
            background-color: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #444;
        }
        .modal-header {
            border-bottom: 1px solid #444;
        }
        .modal-footer {
            border-top: 1px solid #444;
        }
        .btn-close-white {
            filter: invert(1) grayscale(100%) brightness(200%);
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

    <header class="fixed-header">
        <h1>iOS Apps</h1>
        <table class="table table-dark table-sm country-selection-table" id="country-buttons" style="max-width:300px;">
            <tbody>
                <tr>
                    <td><a href="#" class="btn btn-default btn-block btn-sm" data-country="us">US</a></td>
                    <td><a href="#" class="btn btn-default btn-block btn-sm" data-country="jp">JP</a></td>
                    <td><a href="#" class="btn btn-default btn-block btn-sm" data-country="cn">CN</a></td>
                </tr>
            </tbody>
        </table>
    </header>

    <div class="main-content-container">
        <div class="d-grid mx-auto">
            <a href="https://appstoreconnect.apple.com/trends/sales?measure=units_utc&period=hour&interval=hour" target="_blank" class="btn btn-link btn-block">Trends</a>
        </div>
        <table class="table table-dark table-striped table-sm">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col"></th>
                    <th scope="col">タイトル</th>
                    <th scope="col">評価</th>
                    <th scope="col">評価数</th>
                    <th scope="col">詳細</th>
                </tr>
            </thead>
            <tbody id="app-list-body">
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="appInfoModal" tabindex="-1" aria-labelledby="appInfoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalAppName">App Name</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <strong>最新バージョン:</strong> <span id="modalVersion"></span>
                    </div>
                    <div class="mb-3">
                        <strong>最終更新日:</strong> <span id="modalReleaseDate"></span>
                    </div>
                    <div>
                        <strong>説明:</strong>
                        <div id="modalDescription" style="white-space: pre-wrap; font-size: 0.85em; max-height: 250px; overflow-y: auto; background: #2a2a2a; padding: 10px; border-radius: 4px; margin-top: 5px;"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">閉じる</button>
                </div>
            </div>
        </div>
    </div>

    <script id="app-row-template" type="text/html">
        <tr>
            <td>{{index}}</td>
            <td style="white-space: nowrap;">
                <img src="{{artworkUrl100}}" alt="App Icon" style="width: 60px; height: 60px; border-radius: 12px;">
            </td>
            <td>
                <h5><a href="{{trackViewUrl}}" target="_blank">{{trackName}}</a></h5>
        <!--
                <a href="https://appstoreconnect.apple.com/analytics/app/ltd/{{trackId}}" target="_blank" class="btn btn-sm btn-link">全期間</a>
                <a href="https://appstoreconnect.apple.com/analytics/app/r:{{startDate}}:{{endDate}}/{{trackId}}" target="_blank" class="btn btn-sm btn-link">1y</a>
                <a href="https://appstoreconnect.apple.com/analytics/app/d90/{{trackId}}" target="_blank" class="btn btn-sm btn-link">90d</a>
                <a href="https://appstoreconnect.apple.com/analytics/app/d30/{{trackId}}" target="_blank" class="btn btn-sm btn-link">30d</a>
                <a href="https://appstoreconnect.apple.com/analytics/app/d7/{{trackId}}" target="_blank" class="btn btn-sm btn-link">7d</a>
                <a href="https://x.com/search?q=url:apps.apple.com url:id{{trackId}}&f=live" target="_blank" class="btn btn-sm btn-link">Twitter</a>
-->
        
                <a href="https://appstoreconnect.apple.com/apps/{{trackId}}/analytics/metrics?dateSpec=ltd" target="_blank" class="btn btn-sm btn-link">全期間</a>
                <a href="https://appstoreconnect.apple.com/apps/{{trackId}}/analytics/metrics?dateSpec=r:{{startDate}}:{{endDate}}/{{trackId}}" target="_blank" class="btn btn-sm btn-link">1y</a>
                <a href="https://appstoreconnect.apple.com/apps/{{trackId}}/analytics/metrics?dateSpec=d90" target="_blank" class="btn btn-sm btn-link">90d</a>
                <a href="https://appstoreconnect.apple.com/apps/{{trackId}}/analytics/metrics?dateSpec=d30" target="_blank" class="btn btn-sm btn-link">30d</a>
                <a href="https://appstoreconnect.apple.com/apps/{{trackId}}/analytics/metrics?dateSpec=d7" target="_blank" class="btn btn-sm btn-link">7d</a>
                <a href="https://x.com/search?q=url:apps.apple.com url:id{{trackId}}&f=live" target="_blank" class="btn btn-sm btn-link">Twitter</a>
        
            </td>
            <td>{{averageUserRating}}</td>
            <td>{{userRatingCount}}</td>
            <td>
                <button type="button" class="btn btn-sm info-btn" 
                    data-name="{{trackName}}" 
                    data-version="{{version}}" 
                    data-release="{{currentVersionReleaseDate}}" 
                    data-desc="{{description}}">
                    ℹ️
                </button>
            </td>
        </tr>
    </script>

<script>
    $(document).ready(function() {
        const $appListBody = $('#app-list-body');
        const $countryButtons = $('#country-buttons');
        const $appRowTemplate = $('#app-row-template').html();
        let currentCountry = 'us';

        const urlParams = new URLSearchParams(window.location.search);
        const developerId = urlParams.get('developerId') || '939316877';

        const formatDate = (date) => {
            const d = new Date(date);
            const yyyy = d.getFullYear();
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const dd = String(d.getDate()).padStart(2, '0');
            return `${yyyy}/${mm}/${dd}`;
        };

        const fetchAndDisplayApps = (country) => {
            const apiUrl = `https://itunes.apple.com/lookup?id=${developerId}&entity=software&country=${country}&limit=200`;

            $.ajax({
                url: apiUrl,
                method: 'GET',
                dataType: 'jsonp',
                success: function(data) {
                    if (!data || !data.results) {
                        $appListBody.html('<tr><td colspan="6">データの取得に失敗しました。</td></tr>');
                        return;
                    }

                    const appList = data.results.sort((a, b) => b.trackId - a.trackId);
                    $appListBody.empty();
                    
                    const now = new Date();
                    const oneYearAgo = new Date();
                    oneYearAgo.setFullYear(now.getFullYear() - 1);
                    
                    const dateToString = (date) => {
                        return date.getFullYear() + String(date.getMonth() + 1).padStart(2, '0') + String(date.getDate()).padStart(2, '0');
                    };

                    $.each(appList.filter(app => app.kind === 'software'), function(index, app) {
                        let rowHtml = $appRowTemplate;
                        rowHtml = rowHtml.replace(/{{index}}/g, index + 1);
                        rowHtml = rowHtml.replace(/{{artworkUrl100}}/g, app.artworkUrl100 || '');
                        rowHtml = rowHtml.replace(/{{trackName}}/g, app.trackName || 'N/A');
                        rowHtml = rowHtml.replace(/{{trackId}}/g, app.trackId);
                        rowHtml = rowHtml.replace(/{{averageUserRating}}/g, app.averageUserRating ? app.averageUserRating.toFixed(1) : 'N/A');
                        rowHtml = rowHtml.replace(/{{userRatingCount}}/g, app.userRatingCount || 'N/A');
                        rowHtml = rowHtml.replace(/{{trackViewUrl}}/g, app.trackViewUrl || '#');
                        
                        // Modal用の追加データ
                        rowHtml = rowHtml.replace(/{{version}}/g, app.version || 'N/A');
                        rowHtml = rowHtml.replace(/{{currentVersionReleaseDate}}/g, app.currentVersionReleaseDate ? formatDate(app.currentVersionReleaseDate) : 'N/A');
                        // HTML属性に安全に入れるためエスケープ簡易処理
                        const escapedDesc = (app.description || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
                        rowHtml = rowHtml.replace(/{{description}}/g, escapedDesc);

                        rowHtml = rowHtml.replace(/{{startDate}}/g, dateToString(oneYearAgo));
                        rowHtml = rowHtml.replace(/{{endDate}}/g, dateToString(now));
                        
                        $appListBody.append(rowHtml);
                    });
                }
            });

            $countryButtons.find('.btn').removeClass('btn-primary').addClass('btn-default');
            $countryButtons.find(`[data-country="${country}"]`).removeClass('btn-default').addClass('btn-primary');
        };

        // Modal表示のイベント
        $(document).on('click', '.info-btn', function() {
            const btn = $(this);
            $('#modalAppName').text(btn.data('name'));
            $('#modalVersion').text(btn.data('version'));
            $('#modalReleaseDate').text(btn.data('release'));
            $('#modalDescription').text(btn.data('desc'));
            
            const infoModal = new bootstrap.Modal(document.getElementById('appInfoModal'));
            infoModal.show();
        });

        $countryButtons.on('click', 'a', function(event) {
            event.preventDefault();
            currentCountry = $(this).data('country');
            fetchAndDisplayApps(currentCountry);
        });

        fetchAndDisplayApps(currentCountry);
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
